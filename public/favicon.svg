<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="8" fill="#0D0D0D"/>
  
  <!-- Rupee symbol (₹) in white, simplified for small size -->
  <!-- Top horizontal bar -->
  <line x1="10" y1="9" x2="22" y2="9" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Second horizontal bar -->
  <line x1="10" y1="14" x2="20" y2="14" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Vertical stem -->
  <line x1="12" y1="9" x2="12" y2="24" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Diagonal leg of rupee (bottom right) -->
  <line x1="12" y1="14" x2="21" y2="24" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  
  <!-- Violet slash = the "split" -->
  <line x1="20" y1="7" x2="14" y2="26" stroke="#b613ec" stroke-width="2.5" stroke-linecap="round"/>
</svg>
